services:
  - type: web
    name: flipkart-price-tracker-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GMAIL_SENDER_EMAIL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false